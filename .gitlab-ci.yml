image: node:20

stages:
  - install
  - test
  - security
  - performance

variables:
  MONGO_URI: "mongodb://mongo:27017/test-db"
  JWT_SECRET: "test_secret"

services:
  - mongo:latest
  - postgres:latest

cache:
  paths:
    - node_modules/
    - auth-api/node_modules/
    - commande-api/node_modules/
    - api-gateway/node_modules/
    - frontend/node_modules/

install_dependencies:
  stage: install
  script:
    - npm install
    - cd auth-api && npm ci
    - cd ../commande-api && npm ci
    - cd ../api-gateway && npm ci
    - cd ../frontend && npm ci --legacy-peer-deps

unit_tests:
  stage: test
  script:
    - cd auth-api && npm test
    - cd ../commande-api && npm test
    - cd ../frontend && npm test

integration_tests:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache docker-compose nodejs npm
  script:
    - docker-compose up -d auth-api logistique-api commande-api api-gateway auth-db commande-db logistique-db
    - sleep 45
    - npm install
    - node test-integration.js
  after_script:
    - docker-compose down -v
  allow_failure: true

coverage_reports:
  stage: test
  script:
    - cd auth-api && npm run test:coverage
    - cd ../commande-api && npm run test:coverage
    - cd ../frontend && npm run test:coverage
  artifacts:
    paths:
      - auth-api/coverage/
      - commande-api/coverage/
      - frontend/coverage/
    expire_in: 1 week

frontend_build:
  stage: test
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm run build

security_scan:
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true

container_scan:
  stage: security
  image: docker:latest
  services:
    - docker:dind
  script:
    - apk add --no-cache curl
    - curl -sf https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy fs . --severity HIGH,CRITICAL
  allow_failure: true

performance_test:
  stage: performance
  image: 
    name: loadimpact/k6:latest
    entrypoint: [""]
  script:
    - k6 run performance-test.js
  allow_failure: true
  only:
    - main
    - master
