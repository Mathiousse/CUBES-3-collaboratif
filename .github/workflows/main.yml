name: CI

on:
  push:
    branches: [main, DEV, develop]
  pull_request:
    branches: [main, DEV, develop]
  schedule:
    - cron: '0 6 * * 1'

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint --if-present
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Install service dependencies
        run: |
          cd auth-api && npm ci && cd ..
          cd commande-api && npm ci && cd ..
          cd logistique-api-nodejs-backup && npm ci && cd ..
          cd frontend && npm ci --legacy-peer-deps && cd ..
      - name: Run Auth API tests
        run: npm run test:auth
        continue-on-error: true
      - name: Run Logistics API tests
        run: npm run test:logistics
        continue-on-error: true
      - name: Run Orders API tests
        run: npm run test:orders
        continue-on-error: true
      - name: Run Frontend tests
        run: npm run test:frontend
        continue-on-error: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:integration
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          ignore-unfixed: true
          skip-dirs: 'certs'
          exit-code: '0'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build --if-present

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Auth API
        run: docker build -t goodfood-auth:test ./auth-api
      - name: Build Commande API
        run: docker build -t goodfood-commande:test ./commande-api
      - name: Build API Gateway
        run: docker build -t goodfood-gateway:test ./api-gateway
      - name: Build Frontend
        run: docker build -t goodfood-frontend:test ./frontend
      - name: Build Logistique API
        run: docker build -t goodfood-logistique:test ./logistique-api

  deploy:
    name: Deploy to Local
    runs-on: [self-hosted, Linux, X64]
    needs: [lint, test-unit, security, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: |
          cd "/mnt/c/Users/mmous/Documents/Work - Local/School/CUBES-3-collaboratif"
          docker compose down -v 2>/dev/null || true
          docker compose up -d --build
      - name: Health check
        run: |
          sleep 15
          echo "Service status:"
          curl -sf http://localhost:8080/api/health && echo " [api-gateway]" || echo "[api-gateway] starting..."
          curl -sf http://localhost:3001/health && echo " [auth-api]" || echo "[auth-api] starting..."
          curl -sf http://localhost:3003/health && echo " [commande-api]" || echo "[commande-api] starting..."
        continue-on-error: true
      - run: docker ps

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test-unit, security, build]
    if: success()
    steps:
      - run: echo "All checks passed"
