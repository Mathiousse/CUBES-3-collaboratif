# SonarQube Configuration
# Run: sonar-scanner

sonar.projectKey=cubes3-goodfood
sonar.projectName=CUBES3 Good Food Application
sonar.projectVersion=1.0

# Source directories
sonar.sources=auth-api,commande-api,logistique-api/src,frontend/src,api-gateway
sonar.tests=auth-api/tests,commande-api/tests,frontend/src/tests,logistique-api/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Analysis scope
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=**/*.test.js,**/*.spec.js

# Security hotspots
sonar.security.hotspots.enabled=true

# Code coverage minimum
sonar.coverage.minimum=70
